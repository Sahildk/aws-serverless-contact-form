# AWS SAM CLI default configuration
# Generated for: aws-serverless-contact-form
# Run `sam deploy --guided` to deploy and update these values interactively.

version = 0.1

[default]
[default.global.parameters]
stack_name = "aws-serverless-contact-form"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
# After first deploy, update these with your verified SES email addresses:
# parameter_overrides = "RecipientEmail=you@example.com SenderEmail=noreply@yourdomain.com Environment=prod"
